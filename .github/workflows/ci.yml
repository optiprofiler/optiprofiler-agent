name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core tests (no RAG)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'

      - name: Run core tests (skip RAG)
        run: pytest tests/ -v --ignore=tests/test_rag.py -x

  test-rag:
    name: RAG tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: rag-pip-${{ hashFiles('pyproject.toml') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}

      - name: Install package with RAG dependencies
        run: pip install -e '.[dev,rag]'

      - name: Run RAG tests
        run: pytest tests/test_rag.py -v -x

  eval-dry:
    name: Eval (dry-run, no LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: eval-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install package
        run: pip install -e '.[dev,rag]'

      - name: Validate eval cases load
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          cases_dir = Path('tests/eval_cases')
          total = 0
          for f in sorted(cases_dir.glob('*.json')):
              data = json.loads(f.read_text())
              assert isinstance(data, list), f'{f} is not a list'
              total += len(data)
              print(f'  {f.name}: {len(data)} cases')
          print(f'Total: {total} cases')
          assert total > 0, 'No cases found'
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check optiprofiler_agent/ tests/ scripts/

  prose-lint:
    name: Prose & terminology lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codespell
        run: pip install codespell

      - name: Terminology check
        run: python scripts/check_prose.py --ci

      - name: Spell check (codespell)
        run: codespell --skip "*.json,*.pyc,__pycache__,.venv,node_modules" optiprofiler_agent/knowledge/ optiprofiler_agent/agent_a/prompts/ optiprofiler_agent/agent_b/prompts/ optiprofiler_agent/agent_c/prompts/ docs/
