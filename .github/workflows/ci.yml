name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core tests (no RAG)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'

      # Guard: critical new test modules must exist + be picked up by collection.
      # Catches accidental rename / move that would silently drop coverage of
      # init / onboarding / env-precedence / first-run hook.
      - name: Verify new test modules are collected
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED=(
            tests/test_onboarding.py
            tests/test_config_env_precedence.py
            tests/test_cli_first_run.py
            tests/test_runtime.py
          )
          for f in "${REQUIRED[@]}"; do
            test -f "$f" || { echo "::error::missing required test file $f"; exit 1; }
          done
          collected=$(pytest tests/ --collect-only -q --ignore=tests/test_rag.py 2>&1 | tail -1)
          echo "Collected: $collected"
          # 250 = post-rename floor (Apr 2026); update if you intentionally
          # remove tests, NOT to silence flakes.
          n=$(echo "$collected" | grep -oE '[0-9]+' | head -1)
          if [ "${n:-0}" -lt 230 ]; then
            echo "::error::test collection dropped to $n (expected >= 230)"
            exit 1
          fi

      # Smoke: verify the auto-init hook degrades cleanly without a TTY.
      # CI has no stdin, so the wizard MUST skip rather than block forever.
      # Also confirms bootstrap.ensure() works on a fresh OPAGENT_HOME.
      - name: Smoke test — opagent boots in non-TTY env
        shell: bash
        env:
          OPAGENT_HOME: ${{ runner.temp }}/opagent_ci
          OPAGENT_NO_AUTO_INIT: "1"
        run: |
          opagent --version
          opagent --help > /dev/null
          # Run init explicitly with --no-interactive to confirm scriptable mode
          opagent init --no-interactive || true

      - name: Run core tests (skip RAG)
        run: pytest tests/ -v --ignore=tests/test_rag.py -x

  test-rag:
    name: RAG tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: rag-pip-${{ hashFiles('pyproject.toml') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}

      - name: Install package with RAG dependencies
        run: pip install -e '.[dev,rag]'

      - name: Run RAG tests
        run: pytest tests/test_rag.py -v -x

  eval-dry:
    name: Eval (dry-run, no LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: eval-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install package
        run: pip install -e '.[dev,rag]'

      - name: Validate eval cases load
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          cases_dir = Path('tests/eval_cases')
          total = 0
          for f in sorted(cases_dir.glob('*.json')):
              data = json.loads(f.read_text())
              assert isinstance(data, list), f'{f} is not a list'
              total += len(data)
              print(f'  {f.name}: {len(data)} cases')
          print(f'Total: {total} cases')
          assert total > 0, 'No cases found'
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check optiprofiler_agent/ tests/ scripts/

  prose-lint:
    name: Prose & terminology lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codespell
        run: pip install codespell

      - name: Terminology check
        run: python scripts/check_prose.py --ci

      - name: Spell check (codespell)
        run: codespell --skip "*.json,*.pyc,__pycache__,.venv,node_modules" optiprofiler_agent/knowledge/ optiprofiler_agent/advisor/prompts/ optiprofiler_agent/debugger/prompts/ optiprofiler_agent/interpreter/prompts/ docs/
