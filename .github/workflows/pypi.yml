# Publish wheel + sdist to PyPI when a version tag is pushed.
# Same pattern as optiprofiler: secrets.PYPI_TOKEN + pypa/gh-action-pypi-publish.
# No GitHub Environments required.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Verify git tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYV=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
          echo "Tag (without leading v): ${TAG}"
          echo "pyproject.toml version:     ${PYV}"
          if [ "${TAG}" != "${PYV}" ]; then
            echo "::error::Version mismatch — git tag is v${TAG} but pyproject.toml version is ${PYV}. They must be identical (e.g. both 0.1.0)."
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  upload_pypi:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
